<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ESP32 Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

:root {
  --bg:     #060a0f;
  --panel:  #0a1018;
  --border: #142030;
  --cyan:   #00e5ff;
  --green:  #00ff88;
  --yellow: #ffdd00;
  --red:    #ff3355;
  --orange: #ff8800;
  --dim:    #1a2a3a;
  --text:   #8ab8d0;
  --mono:   'Share Tech Mono', monospace;
  --orbit:  'Orbitron', sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Grid noise texture */
body::after {
  content:'';
  position:fixed; inset:0;
  background-image:
    linear-gradient(rgba(0,229,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events:none;
  z-index:0;
}

/* Scanlines */
body::before {
  content:'';
  position:fixed; inset:0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 3px,
    rgba(0,229,255,.012) 3px, rgba(0,229,255,.012) 4px
  );
  pointer-events:none;
  z-index:9999;
}

/* ── HEADER ─────────────────────────────────────── */
header {
  position:relative; z-index:10;
  padding: 16px 28px;
  border-bottom: 1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  background: rgba(0,229,255,.04);
}
.logo {
  font-family: var(--orbit);
  font-size: 14px;
  font-weight: 700;
  color: var(--cyan);
  letter-spacing: 4px;
  text-shadow: 0 0 20px rgba(0,229,255,.5);
}
.logo sub { font-size: 9px; opacity:.5; font-family: var(--mono); font-weight:400; }
.pill {
  font-size: 10px;
  padding: 4px 14px;
  border-radius: 2px;
  letter-spacing: 3px;
  text-transform: uppercase;
  border: 1px solid;
  transition: all .4s;
}
.pill.live   { color:var(--green);  border-color:var(--green);  background:rgba(0,255,136,.08); }
.pill.wait   { color:var(--yellow); border-color:var(--yellow); background:rgba(255,221,0,.08); }
.pill.dead   { color:var(--red);    border-color:var(--red);    background:rgba(255,51,85,.08); }

/* ── TRACK VISUALIZER ───────────────────────────── */
.track-section {
  position:relative; z-index:1;
  padding: 24px 28px 12px;
}
.section-label {
  font-size:10px; letter-spacing:3px; text-transform:uppercase;
  opacity:.4; margin-bottom:10px;
}
.track-wrap {
  background: var(--panel);
  border: 1px solid var(--border);
  height: 120px;
  position: relative;
  overflow: hidden;
}

/* The rail line */
.track-wrap::after {
  content:'';
  position:absolute;
  top:50%; left:20px; right:20px;
  height:2px;
  background: linear-gradient(90deg,
    transparent, var(--dim) 5%, var(--dim) 95%, transparent);
  transform:translateY(-50%);
}

/* Tick marks on rail */
.rail-ticks {
  position:absolute;
  top:50%; left:20px; right:20px;
  display:flex; justify-content:space-between;
  transform:translateY(-50%);
  z-index:1;
}
.tick {
  width:1px; height:10px;
  background: var(--dim);
  position:relative;
}
.tick span {
  position:absolute;
  top:14px; left:50%;
  transform:translateX(-50%);
  font-size:8px; white-space:nowrap;
  opacity:.3;
}

/* Moving dot */
#obj-dot {
  position:absolute;
  top:50%; width:16px; height:16px;
  border-radius:50%;
  background: var(--cyan);
  box-shadow: 0 0 12px var(--cyan), 0 0 30px rgba(0,229,255,.4);
  transform:translate(-50%, -50%);
  left: 20px;  /* updated by JS */
  transition: left .4s linear;
  z-index:10;
}

/* Trail canvas */
#trail-canvas {
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:5;
}

.track-labels {
  display:flex; justify-content:space-between;
  padding: 6px 20px 0;
  font-size:9px; opacity:.25; letter-spacing:1px;
}

/* ── SPEED GAUGE ────────────────────────────────── */
.gauge-row {
  position:relative; z-index:1;
  padding: 8px 28px 0;
  display:flex; align-items:center; gap:16px;
}
.gauge-bar-wrap {
  flex:1;
  height:6px;
  background: var(--dim);
  position:relative;
  overflow:hidden;
}
.gauge-bar-fill {
  height:100%;
  width:0%;
  background: linear-gradient(90deg, var(--green), var(--cyan), var(--yellow));
  transition: width .3s ease;
  box-shadow: 0 0 8px rgba(0,229,255,.4);
}
.speed-label {
  font-family: var(--orbit);
  font-size:24px;
  color: var(--cyan);
  min-width:80px;
  text-align:right;
  text-shadow: 0 0 12px rgba(0,229,255,.6);
}
.speed-unit { font-size:10px; opacity:.4; }

/* ── METRIC CARDS ───────────────────────────────── */
.cards {
  position:relative; z-index:1;
  display:grid;
  grid-template-columns: repeat(5, 1fr);
  gap:12px;
  padding: 20px 28px;
}
@media(max-width:900px) { .cards { grid-template-columns:repeat(3,1fr); } }
@media(max-width:560px) { .cards { grid-template-columns:1fr 1fr; } }

.card {
  background: var(--panel);
  border: 1px solid var(--border);
  padding: 18px 16px;
  position:relative;
  overflow:hidden;
}
.card::before {
  content:''; position:absolute;
  top:0; left:0; right:0; height:1px;
}
.card.c-pos  ::before { background:var(--cyan);   }
.card.c-dist ::before { background:var(--green);  }
.card.c-volt ::before { background:var(--blue);   }
.card.c-curr ::before { background:var(--yellow); }
.card.c-pwr  ::before { background:var(--orange); }

.card::before { background:var(--dim); }
.card.c-pos  { border-top-color:var(--cyan);   }
.card.c-dist { border-top-color:var(--green);  }
.card.c-volt { border-top-color: #4488ff;      }
.card.c-curr { border-top-color:var(--yellow); }
.card.c-pwr  { border-top-color:var(--orange); }

.card-lbl {
  font-size:9px; letter-spacing:2px; text-transform:uppercase;
  opacity:.35; margin-bottom:10px;
}
.card-val {
  font-family: var(--orbit);
  font-size:28px;
  line-height:1;
  color:#fff;
}
.card-val.c-pos  { color:var(--cyan);   text-shadow:0 0 10px rgba(0,229,255,.5); }
.card-val.c-dist { color:var(--green);  text-shadow:0 0 10px rgba(0,255,136,.4); }
.card-val.c-volt { color:#4488ff;       text-shadow:0 0 10px rgba(68,136,255,.4); }
.card-val.c-curr { color:var(--yellow); text-shadow:0 0 10px rgba(255,221,0,.4); }
.card-val.c-pwr  { color:var(--orange); text-shadow:0 0 10px rgba(255,136,0,.4); }
.card-unit { font-size:11px; opacity:.3; font-family:var(--mono); margin-left:2px; }
.card-sub  { font-size:10px; opacity:.25; margin-top:6px; }

/* ── CHARTS ROW ─────────────────────────────────── */
.charts {
  position:relative; z-index:1;
  display:grid; grid-template-columns:1fr 1fr;
  gap:12px; padding:0 28px 20px;
}
@media(max-width:700px) { .charts { grid-template-columns:1fr; } }

.chart-box {
  background:var(--panel);
  border: 1px solid var(--border);
  padding:16px;
}
.chart-title {
  font-size:9px; letter-spacing:3px; text-transform:uppercase;
  opacity:.35; margin-bottom:12px;
}
canvas.mini { width:100%!important; height:90px!important; display:block; }

/* ── LOG ────────────────────────────────────────── */
.log-section {
  position:relative; z-index:1;
  padding:0 28px 28px;
}
.log-box {
  background:var(--panel);
  border:1px solid var(--border);
  height:140px; overflow-y:auto;
  padding:10px 14px;
  font-size:10px; line-height:2;
}
.log-box::-webkit-scrollbar { width:3px; }
.log-box::-webkit-scrollbar-thumb { background:var(--dim); }

.le-ts  { color:var(--dim); }
.le-ok  { color:var(--green); }
.le-warn{ color:var(--yellow); }
.le-err { color:var(--red); }

/* Config bar */
.cfg-bar {
  position:relative; z-index:1;
  display:flex; align-items:center; gap:16px; flex-wrap:wrap;
  padding:10px 28px;
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
  background:rgba(0,229,255,.02);
  font-size:10px; letter-spacing:2px; text-transform:uppercase;
}
.cfg-bar label { opacity:.35; }
select {
  background:#080e14; border:1px solid var(--dim);
  color:var(--cyan); font-family:var(--mono); font-size:11px;
  padding:4px 8px; outline:none; cursor:pointer;
}
select option { background:#080e14; }

@keyframes blink { 50%{opacity:0;} }
.blink { animation: blink 1s steps(1) infinite; }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">
    ESP32 TRACKER <sub>// INA219 + POTENTIOMETER</sub>
  </div>
  <div style="display:flex;gap:14px;align-items:center;">
    <span style="font-size:10px;opacity:.3;" id="last-ts">--:--:--</span>
    <div class="pill wait" id="status">WAITING</div>
  </div>
</header>

<!-- Config -->
<div class="cfg-bar">
  <label>Refresh</label>
  <select id="sel-refresh" onchange="setRefresh(this.value)">
    <option value="1000">1s</option>
    <option value="3000" selected>3s</option>
    <option value="5000">5s</option>
    <option value="10000">10s</option>
  </select>
  <label>Track Window</label>
  <select id="sel-window" onchange="trackWindow=+this.value">
    <option value="50">50 pts</option>
    <option value="100" selected>100 pts</option>
    <option value="200">200 pts</option>
  </select>
  <label>Device</label>
  <select id="sel-device" onchange="device=this.value">
    <option value="">All</option>
  </select>
  <span style="margin-left:auto;opacity:.2;font-size:9px;" id="pkt-count">0 packets</span>
</div>

<!-- Track Visualizer -->
<div class="track-section">
  <div class="section-label">▸ OBJECT TRACK — X Axis (straight line)</div>
  <div class="track-wrap" id="track-wrap">
    <canvas id="trail-canvas"></canvas>
    <!-- Ticks -->
    <div class="rail-ticks" id="ticks"></div>
    <!-- Object dot -->
    <div id="obj-dot"></div>
  </div>
  <div class="track-labels">
    <span id="track-min">0</span>
    <span>X Position</span>
    <span id="track-max">—</span>
  </div>
</div>

<!-- Speed Bar -->
<div class="gauge-row">
  <div class="speed-label" id="spd-val">0<span class="speed-unit">%</span></div>
  <div class="gauge-bar-wrap">
    <div class="gauge-bar-fill" id="spd-bar"></div>
  </div>
  <div style="font-size:10px;opacity:.3;min-width:60px;">
    <span id="spd-ups">0.00</span> u/s
  </div>
</div>

<!-- Metric Cards -->
<div class="cards">
  <div class="card c-pos">
    <div class="card-lbl">▸ Position X</div>
    <div class="card-val c-pos" id="v-posx">—<span class="card-unit">u</span></div>
    <div class="card-sub" id="s-posx">Y=0 Z=0</div>
  </div>
  <div class="card c-dist">
    <div class="card-lbl">∫ Total Distance</div>
    <div class="card-val c-dist" id="v-dist">—<span class="card-unit">u</span></div>
    <div class="card-sub" id="s-dist">—</div>
  </div>
  <div class="card c-volt">
    <div class="card-lbl">⚡ Voltage</div>
    <div class="card-val c-volt" id="v-volt">—<span class="card-unit">V</span></div>
    <div class="card-sub" id="s-volt">avg —</div>
  </div>
  <div class="card c-curr">
    <div class="card-lbl">〜 Current</div>
    <div class="card-val c-curr" id="v-curr">—<span class="card-unit">mA</span></div>
    <div class="card-sub" id="s-curr">avg —</div>
  </div>
  <div class="card c-pwr">
    <div class="card-lbl">◈ Power</div>
    <div class="card-val c-pwr" id="v-pwr">—<span class="card-unit">mW</span></div>
    <div class="card-sub" id="s-pwr">— W</div>
  </div>
</div>

<!-- Mini Charts -->
<div class="charts">
  <div class="chart-box">
    <div class="chart-title">Speed % History</div>
    <canvas class="mini" id="c-speed"></canvas>
  </div>
  <div class="chart-box">
    <div class="chart-title">Power mW History</div>
    <canvas class="mini" id="c-power"></canvas>
  </div>
</div>

<!-- Log -->
<div class="log-section">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
    <span style="font-size:9px;letter-spacing:3px;opacity:.35;text-transform:uppercase;">▸ Event Log</span>
    <button onclick="clearLog()" style="background:none;border:1px solid var(--dim);color:var(--dim);
      font-family:var(--mono);font-size:9px;padding:3px 10px;cursor:pointer;letter-spacing:2px;">CLR</button>
  </div>
  <div class="log-box" id="log"></div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────
const API    = "https://techfest2026-three.vercel.app";
let device   = '';
let trackWindow = 100;
let refreshMs   = 3000;
let timer       = null;
let totalPkts   = 0;

// Chart histories
let spdHist = [];
let pwrHist = [];

// Track state
let trackMin = 0;
let trackMax = 10;   // will auto-expand

// ── TRAIL CANVAS SETUP ────────────────────────────────
const trailCanvas = document.getElementById('trail-canvas');
const tCtx        = trailCanvas.getContext('2d');
let   trailPoints = [];     // [{x: pixel, y: pixel}]
let   dataXHistory = [];   // real x values for mapping

function resizeTrail() {
  const wrap = document.getElementById('track-wrap');
  trailCanvas.width  = wrap.clientWidth;
  trailCanvas.height = wrap.clientHeight;
}
resizeTrail();
window.addEventListener('resize', () => { resizeTrail(); drawTrail(); });

function drawTrail() {
  tCtx.clearRect(0, 0, trailCanvas.width, trailCanvas.height);
  if (trailPoints.length < 2) return;
  tCtx.beginPath();
  tCtx.strokeStyle = 'rgba(0,229,255,0.35)';
  tCtx.lineWidth   = 2;
  trailPoints.forEach((p, i) => {
    if (i === 0) tCtx.moveTo(p.px, p.py);
    else          tCtx.lineTo(p.px, p.py);
  });
  tCtx.stroke();
}

function dataXtoPixel(x) {
  const wrap = document.getElementById('track-wrap');
  const pad  = 28;
  const w    = wrap.clientWidth - pad * 2;
  const range = Math.max(trackMax - trackMin, 0.001);
  return pad + ((x - trackMin) / range) * w;
}

// Build tick marks
function buildTicks() {
  const container = document.getElementById('ticks');
  container.innerHTML = '';
  const steps = 10;
  for (let i = 0; i <= steps; i++) {
    const val  = trackMin + (trackMax - trackMin) * (i / steps);
    const div  = document.createElement('div');
    div.className = 'tick';
    const sp   = document.createElement('span');
    sp.textContent = val.toFixed(0);
    div.appendChild(sp);
    container.appendChild(div);
  }
  document.getElementById('track-min').textContent = trackMin.toFixed(1);
  document.getElementById('track-max').textContent = trackMax.toFixed(1);
}
buildTicks();

// ── MINI CHART DRAW ───────────────────────────────────
function drawMini(canvasId, data, color, unit) {
  const c   = document.getElementById(canvasId);
  const ctx = c.getContext('2d');
  const w   = c.parentElement.clientWidth - 32;
  const h   = 90;
  c.width = w; c.height = h;
  ctx.clearRect(0, 0, w, h);

  if (data.length < 2) return;
  const max   = Math.max(...data) * 1.15 || 1;
  const min   = Math.min(0, Math.min(...data));
  const range = max - min || 1;

  // Grid
  for (let i = 0; i <= 3; i++) {
    const y = h - 16 - (i / 3) * (h - 22);
    ctx.strokeStyle = 'rgba(20,32,48,0.9)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
    const v = (min + range * (i / 3)).toFixed(1);
    ctx.fillStyle = 'rgba(138,184,208,.2)';
    ctx.font = '8px Share Tech Mono, monospace';
    ctx.fillText(v + unit, 3, y - 2);
  }

  // Fill area
  const grd = ctx.createLinearGradient(0, 0, 0, h);
  grd.addColorStop(0, color + '44');
  grd.addColorStop(1, 'transparent');
  ctx.beginPath();
  data.forEach((v, i) => {
    const x = (i / (data.length - 1)) * w;
    const y = h - 16 - ((v - min) / range) * (h - 22);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.lineTo(w, h); ctx.lineTo(0, h); ctx.closePath();
  ctx.fillStyle = grd; ctx.fill();

  // Line
  ctx.beginPath();
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.shadowColor = color; ctx.shadowBlur = 5;
  data.forEach((v, i) => {
    const x = (i / (data.length - 1)) * w;
    const y = h - 16 - ((v - min) / range) * (h - 22);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.stroke();
  ctx.shadowBlur = 0;
}

// ── FETCH & UPDATE ────────────────────────────────────
async function fetchAll() {
  try {
    // Latest reading
    const url1 = `${API}/api/latest${device ? '?device_id='+device : ''}`;
    const r1   = await fetch(url1);
    if (!r1.ok) throw new Error('no data');
    const j1   = await r1.json();
    const d    = j1.latest;
    if (!d) throw new Error('empty');

    updateStatus('live');
    updateCards(d);
    totalPkts++;
    document.getElementById('pkt-count').textContent = totalPkts + ' packets';
    document.getElementById('last-ts').textContent = new Date().toLocaleTimeString();

    addLog(
      `X=${d.pos_x.toFixed(2)} | Spd=${d.speed_pct.toFixed(1)}% | `+
      `V=${d.voltage_V}V | P=${d.power_mW}mW`,
      'le-ok'
    );

  } catch(e) {
    updateStatus('dead');
    addLog('Fetch failed: ' + e.message, 'le-err');
  }

  // History for charts + track
  try {
    const url2 = `${API}/api/history?limit=${trackWindow}${device ? '&device_id='+device : ''}`;
    const r2   = await fetch(url2);
    const j2   = await r2.json();
    const rds  = j2.readings || [];

    spdHist = rds.map(r => r.speed_pct);
    pwrHist = rds.map(r => r.power_mW);
    drawMini('c-speed', spdHist, '#00e5ff', '%');
    drawMini('c-power', pwrHist, '#ff8800', 'mW');

    // Update track
    if (rds.length) {
      dataXHistory = rds.map(r => r.pos_x);
      const newMax = Math.max(...dataXHistory) * 1.1 || 10;
      if (newMax !== trackMax) {
        trackMax = newMax;
        buildTicks();
      }

      // Trail points
      const wrap = document.getElementById('track-wrap');
      trailPoints = rds.map((r) => ({
        px: dataXtoPixel(r.pos_x),
        py: wrap.clientHeight / 2,
      }));
      drawTrail();

      // Move object dot
      const latestX = rds[rds.length - 1].pos_x;
      const dot = document.getElementById('obj-dot');
      dot.style.left = dataXtoPixel(latestX) + 'px';
    }

    // Stats overlay on cards
    if (j2.stats) {
      const s = j2.stats;
      document.getElementById('s-volt').textContent = `avg ${s.voltage_avg_V ?? '—'} V`;
      document.getElementById('s-curr').textContent = `max spd ${s.speed_max_pct ?? '—'}%`;
    }

    // Devices
    const rd = await fetch(`${API}/api/devices`);
    const jd = await rd.json();
    const sel = document.getElementById('sel-device');
    Object.keys(jd.devices).forEach(id => {
      if (!sel.querySelector(`option[value="${id}"]`)) {
        const o = document.createElement('option');
        o.value = id; o.textContent = id;
        sel.appendChild(o);
      }
    });

  } catch(e) { /* silent */ }
}

function updateCards(d) {
  // Speed gauge
  const pct = d.speed_pct || 0;
  document.getElementById('spd-val').innerHTML = pct.toFixed(1) + '<span class="speed-unit">%</span>';
  document.getElementById('spd-bar').style.width = pct + '%';
  document.getElementById('spd-ups').textContent = (d.speed_ups || 0).toFixed(2);

  // Position
  document.getElementById('v-posx').innerHTML = (d.pos_x || 0).toFixed(3) + '<span class="card-unit">u</span>';
  document.getElementById('v-dist').innerHTML = (d.total_distance || 0).toFixed(2) + '<span class="card-unit">u</span>';
  document.getElementById('s-dist').textContent = `Y=${d.pos_y} Z=${d.pos_z}`;

  // Power
  document.getElementById('v-volt').innerHTML = (d.voltage_V||0).toFixed(3) + '<span class="card-unit">V</span>';
  document.getElementById('v-curr').innerHTML = (d.current_mA||0).toFixed(2) + '<span class="card-unit">mA</span>';
  document.getElementById('v-pwr').innerHTML  = (d.power_mW||0).toFixed(2)   + '<span class="card-unit">mW</span>';
  document.getElementById('s-pwr').textContent = ((d.power_mW||0)/1000).toFixed(4) + ' W';
}

function updateStatus(s) {
  const p = document.getElementById('status');
  p.className = 'pill ' + s;
  p.textContent = {live:'LIVE',wait:'WAITING',dead:'OFFLINE'}[s];
}

// ── LOG ───────────────────────────────────────────────
function addLog(msg, cls='') {
  const box = document.getElementById('log');
  const ts  = new Date().toLocaleTimeString();
  box.innerHTML += `<div><span class="le-ts">[${ts}]</span> <span class="${cls}">${msg}</span></div>`;
  while (box.children.length > 80) box.removeChild(box.firstChild);
  box.scrollTop = box.scrollHeight;
}
function clearLog() { document.getElementById('log').innerHTML = ''; }

// ── CONTROLS ──────────────────────────────────────────
function setRefresh(ms) {
  refreshMs = +ms;
  clearInterval(timer);
  start();
  addLog(`Refresh = ${ms/1000}s`, 'le-warn');
}

function start() {
  fetchAll();
  timer = setInterval(fetchAll, refreshMs);
}

// ── BOOT ─────────────────────────────────────────────
addLog('Dashboard ready — waiting for ESP32 telemetry...', 'le-warn');
start();
</script>
